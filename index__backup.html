<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Casa Agua Alta — Coming Soon</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:'DM Sans',sans-serif;color:#F5F2EE;background:#1C1C1C url('images/compressed_DSCF0409.jpg') center/cover no-repeat}
body::after{content:'';position:fixed;inset:0;background:rgba(28,28,28,.7);z-index:0}
.wrap{position:relative;z-index:1;text-align:center;padding:48px;max-width:520px}
.logo img{height:64px;margin:0 auto 40px;filter:brightness(2);opacity:.8}
.line{width:48px;height:1.5px;background:#C9A355;margin:0 auto 32px}
h1{font-family:'DM Serif Display',serif;font-size:clamp(1.8rem,4vw,2.6rem);font-weight:400;font-style:italic;line-height:1.2;margin-bottom:16px}
h1 span{color:#C9A355}
p{font-size:.82rem;font-weight:300;line-height:1.8;color:rgba(245,242,238,.5);margin-bottom:24px}
a{color:#C9A355;text-decoration:none;font-size:.75rem;letter-spacing:.1em;transition:opacity .3s}
a:hover{opacity:.7}
</style>
</head>
<body>
<div class="wrap">
<div class="logo"><img src="images/logo.png" alt="Casa Agua Alta"></div>
<div class="line"></div>
<h1>Something Beautiful Is <span>On Its Way</span></h1>
<p>We're refining every detail to ensure your experience begins the moment you arrive — even here.</p>
<a href="#">@casaaguaalta</a>
</div>
</body>
</html>
